name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Inject analytics
        run: sed -i 's|</head>|${{ secrets.MY_UMAMI }}\n  </head>|' index.html

      - run: npm run build
        env:
          VITE_PROFILE_URL: ${{ secrets.VITE_PROFILE_URL }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
